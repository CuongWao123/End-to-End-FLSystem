  # add some service to visualize the SuperLink and SuperNode metrics, e.g. with Prometheus and Grafana
  # web:
  #   image: nginx
  #   volumes:
  #   - ./templates:/etc/nginx/templates
  #   ports:
  #   - "8080:80"
  #   environment:
  #   - NGINX_HOST=foobar.com
  #   - NGINX_PORT=80
  
  minio:
    image: "quay.io/minio/minio:RELEASE.2025-03-12T18-04-18Z"
    ports:
      - "127.0.0.1:9900:9000"
      - "127.0.0.1:9901:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    restart: unless-stopped


  inference-api:
    build:
      context: ${PROJECT_DIR:-./quickstart-pytorch}
      dockerfile: dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    depends_on:
      - minio
    restart: unless-stopped
    volumes:
      - ${PROJECT_DIR:-./quickstart-pytorch}:/app
